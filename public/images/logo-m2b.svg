<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0f0f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#8b1e2b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="96" height="96" rx="16" fill="url(#bg)"/>

  <!-- Subtle top highlight for depth -->
  <rect width="96" height="2" rx="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Horizontal shipping lane lines (logistics motif) -->
  <line x1="12" y1="30" x2="84" y2="30" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="12" y1="38" x2="84" y2="38" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- M2B bold text -->
  <text x="48" y="62"
        text-anchor="middle"
        font-family="Arial Black, Impact, Haettenschweiler, sans-serif"
        font-weight="900"
        font-size="40"
        fill="#ffffff"
        letter-spacing="-2">M2B</text>

  <!-- Red bottom accent bar -->
  <path d="M0,76 L96,76 L96,80 Q96,96 80,96 L16,96 Q0,96 0,80 Z" fill="url(#accent)"/>

  <!-- Tagline in accent bar -->
  <text x="48" y="89"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="7"
        fill="rgba(255,255,255,0.75)"
        letter-spacing="3">LOGISTIK</text>
</svg>
