<!DOCTYPE html>

<head>

<link rel="icon" href="assets/logo-m2b-clean.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0B1120;
    --navy-mid: #162035;
    --navy-light: #1E2D4A;
    --cream: #F8F5EE;
    --cream-dark: #EDE8DF;
    --warm-white: #FFFDF9;
    --gold: #f5b91c;
    --gold-dim: #d99e0e;
    --crimson: #8b1e2b;
    --text-main: #1A1F2E;
    --text-mid: #4A5270;
    --text-soft: #8891AA;
    --border: #EDE8DF;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); }

  /* Quote drop-cap effect */
  .quote-mark::before {
    content: '"';
    position: absolute;
    top: -20px;
    left: -8px;
    font-family: 'Syne', sans-serif;
    font-size: 120px;
    font-weight: 800;
    color: var(--gold);
    opacity: 0.18;
    line-height: 1;
  }

  /* Timeline */
  .timeline-dot {
    position: absolute;
    left: -7px; top: 6px;
    width: 14px; height: 14px;
    background: var(--gold);
    border: 3px solid var(--cream);
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(245,185,28,0.18);
  }

  /* Fade in animation */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeInUp .6s ease both; }

  /* WhatsApp pulse */
  @keyframes wapulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: #c0bdb7; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="about-app.jsx"></script>
</body>
</html>
