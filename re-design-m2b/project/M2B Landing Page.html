      // ─── Animated Counter Hook ────────────────────────────────────────────────
      function useCounter(target, duration = 1600, startWhen = true) {
        const [value, setValue] = useState(0);
        const startedRef = useRef(false);

        useEffect(() => {
          if (!startWhen || startedRef.current) return;
          startedRef.current = true;

          const numStr = String(target).replace(/[^0-9]/g, "");
          const numTarget = parseInt(numStr, 10) || 0;

          if (numTarget === 0) {
            setValue(0);
            return;
          }

          const start = performance.now();
          const step = (now) => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
            setValue(Math.floor(numTarget * eased));
            if (t < 1) requestAnimationFrame(step);
            else setValue(numTarget);
          };

          requestAnimationFrame(step);
        }, [target, duration, startWhen]);

        return value;
      }

      function useThrottledScroll(threshold = 0) {
        const [passed, setPassed] = useState(() => window.scrollY > threshold);

        useEffect(() => {
          let rafId = null;
          const onScroll = () => {
            if (rafId !== null) return;
            rafId = requestAnimationFrame(() => {
              setPassed(window.scrollY > threshold);
              rafId = null;
            });
          };

          window.addEventListener("scroll", onScroll, { passive: true });
          onScroll();

          return () => {
            window.removeEventListener("scroll", onScroll);
            if (rafId !== null) cancelAnimationFrame(rafId);
          };
        }, [threshold]);

        return passed;
      }

      function useInView(threshold = 0.3) {
        const ref = useRef(null);
        const [inView, setInView] = useState(false);
        useEffect(() => {
          if (!ref.current) return;
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  setInView(true);
                  obs.disconnect();
                }
              });
            },
            { threshold },
          );
          obs.observe(ref.current);
          return () => obs.disconnect();
        }, [threshold]);
        return [ref, inView];
      }

      function shadeColor(hex, pct) {
        const num = parseInt(hex.replace("#", ""), 16);
        const r = Math.min(255, Math.max(0, (num >> 16) + pct));
        const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + pct));
        const b = Math.min(255, Math.max(0, (num & 0xff) + pct));
        return (
          "#" + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1)
        );
      }

                  }}
                >
                  {messages.map((m, i) => (
                    <div
                      key={i}
                      style={{
                        alignSelf:
                          m.role === "user" ? "flex-end" : "flex-start",
                        maxWidth: "85%",
                        padding: "10px 14px",
                        borderRadius: 14,
                        background: m.role === "user" ? "#0B1120" : "#fff",
                        color: m.role === "user" ? "#fff" : "#1A1F2E",
                        fontSize: 13,
                        lineHeight: 1.6,
                        border:
                          m.role === "user" ? "none" : "1px solid #e5e2dc",
                        boxShadow:
                          m.role === "assistant"
                            ? "0 1px 4px rgba(0,0,0,0.04)"
                            : "none",
                      }}
                    >
                      {m.content}
                    </div>
                  ))}
                  {loading && (
                    <div
                      style={{
                        alignSelf: "flex-start",
                        padding: "10px 14px",
                        borderRadius: 14,
                        background: "#fff",
                        border: "1px solid #e5e2dc",
                        fontSize: 13,
                        color: "#666",
                      }}
                    >
                      Mora sedang mengetik...
                    </div>
                  )}
                  <div ref={msgEndRef} />
                </div>

                {/* Quick questions */}
                {messages.length <= 1 && (
                  <div
                    style={{
                      padding: "8px 16px",
                      display: "flex",
                      gap: 6,
                      flexWrap: "wrap",
                      background: "#fafaf6",
                    }}
                  >
                    {quickQs.map((q, i) => (
                      <button
                        key={i}
                        onClick={() => send(q)}
                        style={{
                          padding: "6px 12px",
                          borderRadius: 14,
                          background: "#fff",
                          border: "1px solid #e5e2dc",
                          fontSize: 11,
                          color: "#1A1F2E",
                          cursor: "pointer",
                          fontFamily: "inherit",
                        }}
                      >
                        {q}
                      </button>
                    ))}
                  </div>
                )}

                {/* Input */}
                <div
                  style={{
                    padding: 12,
                    background: "#fff",
                    borderTop: "1px solid #e5e2dc",
                    display: "flex",
                    gap: 8,
                  }}
                >
                  <input
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && send()}
                    placeholder="Tanya tentang ekspor-impor..."
                    style={{
                      flex: 1,
                      padding: "10px 14px",
                      borderRadius: 8,
                      border: "1px solid #e5e2dc",
                      outline: "none",
                      fontSize: 13,
                      fontFamily: "inherit",
                      background: "#fafaf6",
                    }}
                  />
                  <button
                    onClick={send}
                    disabled={loading || !input.trim()}
                    style={{
                      padding: "10px 16px",
                      borderRadius: 8,
                      background:
                        "linear-gradient(135deg, #f5b91c 0%, #d99e0e 100%)",
                      color: "#0B1120",
                      border: "none",
                      cursor:
                        input.trim() && !loading ? "pointer" : "not-allowed",
                      fontWeight: 800,
                      fontSize: 13,
                      fontFamily: "inherit",
                      opacity: input.trim() && !loading ? 1 : 0.5,
                    }}
                  >
                    Kirim
                  </button>
                </div>
                <div
                  style={{
                    padding: "6px 12px 10px",
                    background: "#fff",
                    textAlign: "center",
                    fontSize: 10,
                    color: "#999",
                  }}
                >
                  Powered by AI · Untuk masalah urgent, langsung WhatsApp tim
                </div>
              </div>
            )}
          </>
        );
      }

      // ─── App ──────────────────────────────────────────────────────────────────
      function App() {
        const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
        const accent = tweaks.accentColor;
        const r = parseInt(tweaks.roundness);
        const [lang, setLang] = useState(
          () => localStorage.getItem("m2b-lang") || "id",
        );
        useEffect(() => {
          localStorage.setItem("m2b-lang", lang);
        }, [lang]);
        const t = React.useCallback(
          (id, en) => (lang === "id" ? id : en),
          [lang],
        );

        return (
          <LangContext.Provider value={{ lang, setLang, t }}>
            <NewsTicker accent={accent} />
            <Nav accent={accent} r={r} />
            <Hero accent={accent} heroImg={tweaks.heroImage} r={r} />
            <TrustBar accent={accent} />
            <About accent={accent} r={r} />
            <Services accent={accent} r={r} />
            <WhyUs accent={accent} r={r} />
            {tweaks.showCoverageMap && <CoverageMap accent={accent} r={r} />}
            <Process accent={accent} r={r} />
            <NewsSection accent={accent} r={r} />
            <EBookStrip accent={accent} r={r} />
            {tweaks.showCurrencyWidget && <CurrencyWidget accent={accent} />}
            <PortalFeature accent={accent} r={r} />
            <Testimonials accent={accent} r={r} />
            <FAQ accent={accent} r={r} />
            <Partners accent={accent} r={r} />
            <CSContact accent={accent} r={r} />
            <CTA accent={accent} r={r} />
            <Footer accent={accent} />

            <WhatsAppFloat />
            <TanyaMora />
            <ScrollToTop />

            <TweaksPanel>
              <TweakSection title="Warna & Bentuk">
                <TweakColor id="accentColor" label="Warna Aksen" />
                <TweakSlider
                  id="roundness"
                  label="Sudut Tombol"
                  min={0}
                  max={24}
                  step={2}
                />
              </TweakSection>
              <TweakSection title="Hero Image">
                <TweakRadio
                  id="heroImage"
                  label="Foto Hero"
                  options={[
                    { value: "port", label: "Pelabuhan Aerial" },
                    { value: "ship", label: "Kapal Kargo" },
                    { value: "cargo", label: "Gudang Logistik" },
                  ]}
                />
              </TweakSection>
              <TweakSection title="Widget">
                <TweakToggle
                  id="showCoverageMap"
                  label="Tampilkan Peta Jangkauan"
                />
                <TweakToggle
                  id="showCurrencyWidget"
                  label="Tampilkan Kurs Mata Uang"
                />
              </TweakSection>
            </TweaksPanel>
          </LangContext.Provider>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
    <div id="root"></div>
  </body>
</html>
