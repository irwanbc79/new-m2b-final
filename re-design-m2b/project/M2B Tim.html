<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1120;--navy-mid:#162035;--navy-light:#1E2D4A;--cream:#F8F5EE;--cream-dark:#EDE8DF;--warm-white:#FFFDF9;--gold:#f5b91c;--gold-dim:#d99e0e;--crimson:#8b1e2b;--text-main:#1A1F2E;--text-mid:#4A5270;--text-soft:#8891AA;--border:#EDE8DF}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text-main)}
.member-card:hover img{transform:scale(1.05)}
.member-card img{transition:transform .35s}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:#c0bdb7;border-radius:4px}
</style>
</head>
