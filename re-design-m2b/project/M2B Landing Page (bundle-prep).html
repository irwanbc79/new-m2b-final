  }}>{children}</span>

const Btn = ({ children, variant = 'primary', accent, r = 8, style, onClick }) => {
  const [hov, setHov] = useState(false);
  const isPrimary = variant === 'primary';
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 8,
        padding: '11px 24px', borderRadius: r, border: 'none', cursor: 'pointer',
        fontFamily: 'DM Sans', fontWeight: 600, fontSize: 14, transition: 'all .18s',
        background: isPrimary ? (hov ? shadeColor(accent, -15) : accent) : (hov ? '#f0ede8' : 'transparent'),
        color: isPrimary ? '#fff' : '#0f0f14',
        border: isPrimary ? 'none' : '1.5px solid #d0cdc8',
        boxShadow: isPrimary && hov ? `0 4px 16px ${accent}44` : 'none',
        ...style
      }}>{children}</button>
  );
};

function shadeColor(hex, pct) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + pct));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + pct));
  const b = Math.min(255, Math.max(0, (num & 0xff) + pct));
  return '#' + ((1 << 24)|(r << 16)|(g << 8)|b).toString(16).slice(1);
}

// ─── App ──────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = tweaks.accentColor;
  const r = parseInt(tweaks.roundness);

  return (
    <>
      <NewsTicker accent={accent} />
      <Nav accent={accent} r={r} />
      <Hero accent={accent} heroImg={tweaks.heroImage} r={r} />
      <TrustBar accent={accent} />
      <Services accent={accent} r={r} />
      {tweaks.showCoverageMap && <CoverageMap accent={accent} r={r} />}
      <Process accent={accent} r={r} />
      <NewsSection accent={accent} r={r} />
      {tweaks.showCurrencyWidget && <CurrencyWidget accent={accent} />}
      <PortalFeature accent={accent} r={r} />
      <Testimonials accent={accent} r={r} />
      <CTA accent={accent} r={r} />
      <Footer accent={accent} />

      <TweaksPanel>
        <TweakSection title="Warna & Bentuk">
          <TweakColor id="accentColor" label="Warna Aksen" />
          <TweakSlider id="roundness" label="Sudut Tombol" min={0} max={24} step={2} />
        </TweakSection>
        <TweakSection title="Hero Image">
          <TweakRadio id="heroImage" label="Foto Hero" options={[
            { value: 'port', label: 'Pelabuhan Aerial' },
            { value: 'ship', label: 'Kapal Kargo' },
            { value: 'cargo', label: 'Gudang Logistik' },
          ]} />
        </TweakSection>
        <TweakSection title="Widget">
          <TweakToggle id="showCoverageMap" label="Tampilkan Peta Jangkauan" />
          <TweakToggle id="showCurrencyWidget" label="Tampilkan Kurs Mata Uang" />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<div id="root"></div>
</body>
</html>
