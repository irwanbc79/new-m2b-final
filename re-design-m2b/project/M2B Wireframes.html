// ─── Shared Wireframe Primitives ───────────────────────────────────────────
const W = ({ children, style, ...p }) => (
  <div style={{ fontFamily: "'Caveat', cursive", background: '#faf9f6', color: '#1a1a1a', ...style }} {...p}>
    {children}
  </div>
);
const Box = ({ w, h, label, style, dark, accent, light, dashed }) => (
  <div style={{
    width: w, height: h, minHeight: h,
    background: dark ? '#1a1a2e' : accent ? '#c0392b' : light ? '#e8e4de' : '#ddd8cf',
    border: dashed ? '2px dashed #aaa' : '2px solid #1a1a1a',
    borderRadius: 2,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    fontSize: 13, color: dark||accent ? '#fff' : '#666',
    fontFamily: "'Caveat', cursive",
    textAlign: 'center', padding: 4,
    flexShrink: 0,
    ...style
  }}>{label}</div>
);
const Label = ({ children, style }) => (
  <div style={{ fontSize: 11, color: '#999', fontFamily: "'Caveat', cursive", ...style }}>{children}</div>
);
const Btn = ({ children, primary, style }) => (
  <div style={{
    display: 'inline-block',
    padding: '6px 14px',
    background: primary ? '#c0392b' : 'transparent',
    border: '2px solid ' + (primary ? '#c0392b' : '#1a1a1a'),
    borderRadius: 2,
    fontSize: 13,
    color: primary ? '#fff' : '#1a1a1a',
    fontFamily: "'Caveat', cursive",
    cursor: 'default',
    ...style
  }}>{children}</div>
);
const Annotation = ({ children, style }) => (
  <div style={{
    position: 'absolute',
    fontFamily: "'Caveat', cursive",
    fontSize: 11, color: '#e67e22',
    background: '#fff9f0',
    border: '1px solid #e67e22',
    borderRadius: 4,
    padding: '2px 6px',
    ...style
  }}>← {children}</div>
);
const HR = ({ style }) => <div style={{ height: 1, background: '#ccc', width: '100%', margin: '0', ...style }} />;
const Row = ({ children, style }) => <div style={{ display: 'flex', gap: 8, ...style }}>{children}</div>;
const Col = ({ children, style }) => <div style={{ display: 'flex', flexDirection: 'column', gap: 8, ...style }}>{children}</div>;
